<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khabar Darjeeling Ko — adharlimbu.online</title>
<meta name="description" content="Latest news from Darjeeling hills.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://adharlimbu.online/news/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@500;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --accent:#c0392b; --gold:#b8860b; --ink:#0e0c0a; --paper:#f7f3ee; --muted:#7a7065; --rule:#d4cfc9; }
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:white;font-family:'Barlow Condensed',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:#0a0a0a;border-bottom:3px solid var(--accent);padding:12px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px;}
.brand{text-decoration:none;}
.brand-sub{font-size:10px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;}
.brand-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:white;line-height:1.1;}
.brand-title span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--accent);padding:5px 12px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.live-dot{width:7px;height:7px;background:white;border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.back-btn{text-decoration:none;color:#888;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border:1px solid #333;border-radius:3px;transition:0.2s;}
.back-btn:hover{color:white;border-color:var(--accent);}

/* WEATHER BAR */
.weather-bar{background:#111;padding:8px 5%;display:flex;align-items:center;gap:20px;font-size:13px;color:#888;border-bottom:1px solid #222;flex-wrap:wrap;}
.weather-val{color:white;font-weight:700;}
.weather-date{margin-left:auto;color:#444;font-size:11px;}

/* TAB BAR */
.tab-bar{background:#111;display:flex;gap:0;overflow-x:auto;scrollbar-width:none;border-bottom:2px solid #222;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#666;background:none;border:none;border-bottom:3px solid transparent;padding:11px 16px;cursor:pointer;white-space:nowrap;transition:0.2s;}
.tab-btn:hover{color:white;}
.tab-btn.active{color:white;border-bottom-color:var(--accent);}

/* NEWS GRID */
.news-section{padding:30px 5%;max-width:1100px;margin:0 auto;}
.section-rule{display:flex;align-items:center;gap:12px;margin-bottom:25px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);white-space:nowrap;}
.section-line{flex:1;height:1px;background:#222;}

/* FEATURED CARD */
.featured-card{background:linear-gradient(135deg,#1a0505,#2d0a0a,#1a1a1a);border:1px solid #2a2a2a;border-radius:12px;padding:30px;margin-bottom:25px;cursor:pointer;transition:0.3s;position:relative;overflow:hidden;text-decoration:none;display:block;}
.featured-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 80%,rgba(192,57,43,0.2) 0%,transparent 60%);pointer-events:none;}
.featured-card:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(192,57,43,0.2);}
.featured-tag{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);padding:4px 12px;display:inline-block;margin-bottom:14px;border-radius:2px;}
.featured-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1.2;color:white;margin-bottom:12px;}
.featured-desc{font-family:'Source Serif 4',serif;font-size:14px;line-height:1.7;color:rgba(255,255,255,0.6);margin-bottom:16px;}
.featured-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.read-more{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:1px;}

/* NEWS CARDS GRID */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:30px;}
.news-card{background:#111;border:1px solid #222;border-radius:10px;padding:20px;cursor:pointer;transition:0.25s;text-decoration:none;display:block;}
.news-card:hover{background:#1a1a1a;border-color:#333;transform:translateY(-2px);}
.card-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.35;color:white;margin-bottom:10px;}
.card-desc{font-size:12px;line-height:1.6;color:#666;margin-bottom:12px;}
.card-meta{font-size:11px;color:#444;letter-spacing:1px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.card-read{color:var(--accent);font-size:11px;}

/* TOPICS SECTION */
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:30px;}
.topic-btn{background:#111;border:1px solid #222;border-radius:8px;padding:16px;text-decoration:none;text-align:center;transition:0.2s;display:block;}
.topic-btn:hover{background:#1a1a1a;border-color:var(--accent);}
.topic-emoji{font-size:28px;display:block;margin-bottom:8px;}
.topic-name{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888;}
.topic-btn:hover .topic-name{color:white;}

/* FOOTER */
.news-footer{background:#050505;padding:20px 5%;text-align:center;border-top:1px solid #1a1a1a;margin-top:20px;}
.footer-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:900;margin-bottom:6px;}
.footer-title span{color:var(--accent);}
.footer-p{font-size:11px;color:#444;margin-bottom:12px;letter-spacing:1px;}
.footer-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.footer-link{font-size:11px;color:#444;text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;}
.footer-link:hover{color:var(--accent);}

#backToTop{display:none;position:fixed;bottom:25px;right:25px;background:var(--accent);color:white;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;z-index:999;box-shadow:0 4px 15px rgba(192,57,43,0.4);transition:0.3s;}
#backToTop.show{display:block;}

@media(max-width:600px){
  .featured-title{font-size:22px;}
  .brand-title{font-size:18px;}
  .weather-date{display:none;}
}
</style>
</head>
<body>

<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- HEADER -->
<header class="header">
  <a href="https://adharlimbu.online" class="brand">
    <div class="brand-sub">adharlimbu.online</div>
    <div class="brand-title">🏔️ Khabar <span>Darjeeling Ko</span></div>
  </a>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <a href="https://adharlimbu.online" class="back-btn">← Back</a>
  </div>
</header>

<!-- WEATHER BAR -->
<div class="weather-bar">
  <span>⛅ <span class="weather-val" id="wTemp">--°C</span></span>
  <span>💧 <span class="weather-val" id="wHumidity">--%</span></span>
  <span>💨 <span class="weather-val" id="wWind">--</span> km/h</span>
  <span id="wDesc">Darjeeling</span>
  <span class="weather-date" id="wDate"></span>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('darjeeling',this)">🏔️ Darjeeling</button>
  <button class="tab-btn" onclick="showTab('gorkhaland',this)">🏛️ Gorkhaland</button>
  <button class="tab-btn" onclick="showTab('kalimpong',this)">🗺️ Kalimpong</button>
  <button class="tab-btn" onclick="showTab('siliguri',this)">🏙️ Siliguri</button>
  <button class="tab-btn" onclick="showTab('tea',this)">🍃 Tea</button>
  <button class="tab-btn" onclick="showTab('hills',this)">⛰️ Hills</button>
</div>

<!-- NEWS CONTENT -->
<div class="news-section" id="newsContent"></div>

<!-- FOOTER -->
<footer class="news-footer">
  <div class="footer-title">🏔️ Khabar <span>Darjeeling Ko</span></div>
  <div class="footer-p">CURATED BY ADHAR LIMBU • NEWS VIA GOOGLE NEWS</div>
  <div class="footer-links">
    <a href="https://adharlimbu.online" class="footer-link">Home</a>
    <a href="https://www.youtube.com/@AdharLimbu" target="_blank" class="footer-link">YouTube</a>
    <a href="https://www.instagram.com/adhar_limbu/" target="_blank" class="footer-link">Instagram</a>
    <a href="https://www.facebook.com/nowanadofficial/" target="_blank" class="footer-link">Facebook</a>
  </div>
</footer>

<script>
const TABS = {
  darjeeling: {
    label: 'Darjeeling', query: 'darjeeling',
    featured: { tag:'🏔️ Top Story', title:'Latest News from Darjeeling Hills', desc:'Stay updated with the freshest stories from Darjeeling — politics, tourism, tea, weather and more. Tap any story to read the full article.' },
    cards: [
      { tag:'🌿 Tourism', title:'Tourism & Travel in Darjeeling', desc:'Hotels, attractions and visitor updates from the hills.' },
      { tag:'🍃 Tea Gardens', title:'Darjeeling Tea Industry Updates', desc:'Latest from the world-famous Darjeeling tea estates.' },
      { tag:'🚂 Transport', title:'Toy Train & Roads Update', desc:'DHR heritage railway and road connectivity news.' },
      { tag:'🏛️ Politics', title:'Local Governance & Politics', desc:'GTA, municipal and political developments.' },
      { tag:'🌧️ Weather', title:'Weather & Natural Disasters', desc:'Rainfall alerts, landslides and IMD warnings.' },
      { tag:'📚 Education', title:'Schools & Education News', desc:'Academic updates from Darjeeling district schools.' },
    ]
  },
  gorkhaland: {
    label: 'Gorkhaland', query: 'gorkhaland',
    featured: { tag:'🏛️ Politics', title:'Gorkhaland Political Updates', desc:'Follow the latest developments on the Gorkhaland statehood demand, GTA administration, and hill politics.' },
    cards: [
      { tag:'🏛️ GTA', title:'GTA Administration News', desc:'Decisions and announcements from Gorkhaland Territorial Administration.' },
      { tag:'✊ Movement', title:'Gorkhaland Statehood Demand', desc:'Latest on the political movement for a separate state.' },
      { tag:'🗳️ Elections', title:'Electoral Politics in Hills', desc:'Election news and party updates from Darjeeling constituency.' },
      { tag:'📜 Policy', title:'Government Policies & Hills', desc:'State and central government policies affecting the hills.' },
    ]
  },
  kalimpong: {
    label: 'Kalimpong', query: 'kalimpong',
    featured: { tag:'🗺️ Kalimpong', title:'News from Kalimpong District', desc:'The latest updates from Kalimpong — development, culture, weather and local stories from the scenic district.' },
    cards: [
      { tag:'🌸 Culture', title:'Culture & Festivals', desc:'Local festivals, art and cultural events in Kalimpong.' },
      { tag:'🛣️ Roads', title:'NH-10 & Connectivity', desc:'Road conditions, landslides and connectivity updates.' },
      { tag:'🌿 Nature', title:'Teesta & Environment', desc:'River, forest and environmental news from the region.' },
      { tag:'💡 Development', title:'Infrastructure Projects', desc:'Development and infrastructure news in Kalimpong.' },
    ]
  },
  siliguri: {
    label: 'Siliguri', query: 'siliguri',
    featured: { tag:'🏙️ Siliguri', title:'Siliguri City News & Updates', desc:'The gateway to the Northeast — stay updated with business, transport, crime and development news from Siliguri.' },
    cards: [
      { tag:'🚌 Transport', title:'Bus & Rail Connectivity', desc:'Transport updates from North Bengal\'s largest city.' },
      { tag:'🛒 Business', title:'Trade & Commerce', desc:'Business and market news from Siliguri.' },
      { tag:'🏗️ Development', title:'City Development', desc:'Infrastructure and municipal development updates.' },
      { tag:'⚖️ Crime & Law', title:'Law & Order', desc:'Crime and law enforcement updates from Siliguri.' },
    ]
  },
  tea: {
    label: 'Tea', query: 'darjeeling+tea',
    featured: { tag:'🍃 Tea Industry', title:'Darjeeling Tea — World\'s Finest', desc:'Global demand, auction prices, export figures and stories from the gardens that produce the "Champagne of Teas".' },
    cards: [
      { tag:'💰 Exports', title:'Tea Export & Trade News', desc:'Global trade and export updates for Darjeeling tea.' },
      { tag:'🌱 Gardens', title:'Tea Garden Updates', desc:'News from specific estates across Darjeeling.' },
      { tag:'👷 Workers', title:'Tea Garden Workers', desc:'Labour, wages and worker welfare updates.' },
      { tag:'🏆 Awards', title:'Quality & Recognition', desc:'Awards and recognitions for Darjeeling tea globally.' },
    ]
  },
  hills: {
    label: 'Hills', query: 'west+bengal+hills+news',
    featured: { tag:'⛰️ Bengal Hills', title:'News from the Bengal Hills Region', desc:'Comprehensive coverage of the entire Bengal hills — Darjeeling, Kalimpong, Kurseong, Mirik and beyond.' },
    cards: [
      { tag:'🏔️ Kurseong', title:'Kurseong & Mirik News', desc:'Updates from Kurseong subdivision and Mirik.' },
      { tag:'🌲 Forest', title:'Forests & Wildlife', desc:'Singalila, Neora Valley and wildlife updates.' },
      { tag:'🎓 Heritage', title:'Heritage & History', desc:'UNESCO sites and cultural heritage of the hills.' },
      { tag:'☁️ Climate', title:'Climate & Environment', desc:'Environmental and climate news from the hills.' },
    ]
  }
};

function showTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTab(key);
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderTab(key) {
  const tab = TABS[key];
  const googleNewsUrl = `https://news.google.com/search?q=${tab.query}&hl=en-IN&gl=IN&ceid=IN:en`;
  const searchUrl = `https://www.google.com/search?q=${tab.query}+news&tbm=nws&gl=in&hl=en`;

  const content = document.getElementById('newsContent');
  content.innerHTML = `
    <div class="section-rule">
      <span class="section-label">Top Story</span>
      <div class="section-line"></div>
      <span class="section-label" id="tabDate"></span>
    </div>

    <a href="${googleNewsUrl}" target="_blank" class="featured-card">
      <div class="featured-tag">${tab.featured.tag}</div>
      <div class="featured-title">${tab.featured.title}</div>
      <div class="featured-desc">${tab.featured.desc}</div>
      <div class="featured-meta">
        <span>Via Google News</span>
        <span>•</span>
        <span class="read-more">Read Latest Stories →</span>
      </div>
    </a>

    <div class="section-rule">
      <span class="section-label">More Stories</span>
      <div class="section-line"></div>
    </div>

    <div class="cards-grid">
      ${tab.cards.map(card => `
        <a href="https://www.google.com/search?q=${encodeURIComponent(card.title + ' darjeeling')}&tbm=nws&gl=in" target="_blank" class="news-card">
          <div class="card-tag">${card.tag}</div>
          <div class="card-title">${card.title}</div>
          <div class="card-desc">${card.desc}</div>
          <div class="card-meta">
            <span>Google News</span>
            <span class="card-read">Read →</span>
          </div>
        </a>
      `).join('')}
    </div>

    <div class="section-rule">
      <span class="section-label">Browse by Topic</span>
      <div class="section-line"></div>
    </div>

    <div class="topics-grid">
      <a href="https://news.google.com/search?q=darjeeling+tea&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🍃</span><span class="topic-name">Tea</span></a>
      <a href="https://news.google.com/search?q=darjeeling+tourism&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🌿</span><span class="topic-name">Tourism</span></a>
      <a href="https://news.google.com/search?q=darjeeling+toy+train&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🚂</span><span class="topic-name">Toy Train</span></a>
      <a href="https://news.google.com/search?q=gorkhaland&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🏛️</span><span class="topic-name">Gorkhaland</span></a>
      <a href="https://news.google.com/search?q=darjeeling+weather&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🌧️</span><span class="topic-name">Weather</span></a>
      <a href="https://news.google.com/search?q=kalimpong&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🗺️</span><span class="topic-name">Kalimpong</span></a>
      <a href="https://news.google.com/search?q=siliguri&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">🏙️</span><span class="topic-name">Siliguri</span></a>
      <a href="https://news.google.com/search?q=darjeeling+landslide&hl=en-IN&gl=IN" target="_blank" class="topic-btn"><span class="topic-emoji">⛰️</span><span class="topic-name">Landslide</span></a>
    </div>
  `;

  document.getElementById('tabDate').textContent = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

// Weather
async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=27.0361&longitude=88.2627&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Asia/Kolkata');
    const data = await res.json();
    const c = data.current;
    const code = c.weather_code;
    const desc = code<=1?'☀️ Clear':code<=3?'⛅ Partly Cloudy':code<=49?'🌫️ Foggy':code<=67?'🌧️ Rainy':code<=77?'❄️ Snowy':'⛈️ Stormy';
    document.getElementById('wTemp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('wHumidity').textContent = c.relative_humidity_2m + '%';
    document.getElementById('wWind').textContent = Math.round(c.wind_speed_10m);
    document.getElementById('wDesc').textContent = desc;
  } catch(e) {}
}

window.addEventListener('scroll', () => {
  document.getElementById('backToTop').classList.toggle('show', window.pageYOffset > 300);
});

document.getElementById('wDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

renderTab('darjeeling');
fetchWeather();
</script>
</body>
</html>
