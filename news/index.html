<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khabar Darjeeling Ko — adharlimbu.online</title>
<meta name="description" content="Latest news from Darjeeling hills — live news, local updates, and stories from the mountains.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://adharlimbu.online/news/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23c0392b'>📰</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Barlow Condensed', sans-serif;
  background: #0e0c0a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  background: #0e0c0a;
  border-bottom: 3px solid #c0392b;
  padding: 10px 4%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
  flex-wrap: wrap;
}

.brand { text-decoration: none; }
.brand-sub { font-size: 10px; color: #c0392b; letter-spacing: 3px; text-transform: uppercase; }
.brand-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: white; line-height: 1; }
.brand-title span { color: #c0392b; }

.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #c0392b;
  padding: 5px 12px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.live-dot { width: 7px; height: 7px; background: white; border-radius: 50%; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

.back-btn {
  text-decoration: none;
  color: #888;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid #333;
  border-radius: 3px;
  transition: 0.2s;
}
.back-btn:hover { color: white; border-color: #c0392b; }

/* TAB BAR */
.tab-bar {
  background: #1a1a1a;
  display: flex;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid #333;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #888;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  padding: 11px 18px;
  cursor: pointer;
  white-space: nowrap;
  transition: 0.2s;
}
.tab-btn:hover { color: white; }
.tab-btn.active { color: white; border-bottom-color: #c0392b; }

/* WEATHER BAR */
.weather-bar {
  background: #111;
  padding: 7px 4%;
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
  color: #888;
  flex-shrink: 0;
  border-bottom: 1px solid #222;
  flex-wrap: wrap;
}
.weather-item { display: flex; align-items: center; gap: 6px; }
.weather-val { color: white; font-weight: 700; font-size: 13px; }
.weather-date { margin-left: auto; color: #555; font-size: 11px; }

/* IFRAME CONTAINER */
.iframe-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.news-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* LOADING OVERLAY */
.frame-loading {
  position: absolute;
  inset: 0;
  background: #0e0c0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  transition: opacity 0.5s;
}
.frame-loading.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #333;
  border-top-color: #c0392b;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #888; letter-spacing: 2px; text-transform: uppercase; }

/* FOOTER */
.footer {
  background: #050505;
  padding: 8px 4%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-top: 1px solid #222;
  flex-wrap: wrap;
  gap: 8px;
}
.footer-left { font-size: 11px; color: #555; }
.footer-links { display: flex; gap: 15px; }
.footer-link { font-size: 11px; color: #555; text-decoration: none; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s; }
.footer-link:hover { color: #c0392b; }

@media(max-width: 500px) {
  .brand-title { font-size: 17px; }
  .weather-date { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a href="https://adharlimbu.online" class="brand">
    <div class="brand-sub">adharlimbu.online</div>
    <div class="brand-title">🏔️ Khabar <span>Darjeeling Ko</span></div>
  </a>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Live News</div>
    <a href="https://adharlimbu.online" class="back-btn">← Back</a>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="loadFeed('darjeeling', this)">🏔️ Darjeeling</button>
  <button class="tab-btn" onclick="loadFeed('gorkhaland', this)">🏛️ Gorkhaland</button>
  <button class="tab-btn" onclick="loadFeed('kalimpong', this)">🗺️ Kalimpong</button>
  <button class="tab-btn" onclick="loadFeed('siliguri', this)">🏙️ Siliguri</button>
  <button class="tab-btn" onclick="loadFeed('darjeeling+tea', this)">🍃 Tea</button>
  <button class="tab-btn" onclick="loadFeed('west+bengal+hills', this)">⛰️ Hills</button>
</div>

<!-- WEATHER BAR -->
<div class="weather-bar">
  <div class="weather-item">⛅ <span class="weather-val" id="wTemp">--°C</span></div>
  <div class="weather-item">💧 <span class="weather-val" id="wHumidity">--%</span></div>
  <div class="weather-item">💨 <span class="weather-val" id="wWind">-- km/h</span></div>
  <div class="weather-item" id="wDesc">Darjeeling Weather</div>
  <div class="weather-date" id="wDate"></div>
</div>

<!-- NEWS IFRAME -->
<div class="iframe-container">
  <div class="frame-loading" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading Darjeeling News...</div>
  </div>
  <iframe
    id="newsFrame"
    class="news-frame"
    src="https://news.google.com/search?q=darjeeling&hl=en-IN&gl=IN&ceid=IN:en"
    onload="hideLoader()"
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation">
  </iframe>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-left">🏔️ Khabar Darjeeling Ko • Powered by Google News</div>
  <div class="footer-links">
    <a href="https://www.youtube.com/@AdharLimbu" target="_blank" class="footer-link">YouTube</a>
    <a href="https://www.instagram.com/adhar_limbu/" target="_blank" class="footer-link">Instagram</a>
  </div>
</footer>

<script>
function hideLoader() {
  document.getElementById('loadingOverlay').classList.add('hidden');
}

function loadFeed(query, btn) {
  // Update active tab
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show loader
  document.getElementById('loadingOverlay').classList.remove('hidden');

  // Load new feed
  const frame = document.getElementById('newsFrame');
  frame.src = `https://news.google.com/search?q=${query}&hl=en-IN&gl=IN&ceid=IN:en`;
}

// Weather
async function fetchWeather() {
  try {
    const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=27.0361&longitude=88.2627&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Asia/Kolkata');
    const data = await res.json();
    const c = data.current;
    const code = c.weather_code;
    const desc = code<=1?'☀️ Clear':code<=3?'⛅ Partly Cloudy':code<=49?'🌫️ Foggy':code<=67?'🌧️ Rainy':code<=77?'❄️ Snowy':'⛈️ Stormy';
    document.getElementById('wTemp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('wHumidity').textContent = c.relative_humidity_2m + '%';
    document.getElementById('wWind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('wDesc').textContent = desc;
  } catch(e) {}
}

// Date
document.getElementById('wDate').textContent = new Date().toLocaleDateString('en-IN', {
  weekday:'long', day:'numeric', month:'long', year:'numeric'
});

fetchWeather();
</script>
</body>
</html>
