<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit News - Khabar Darjeeling Ko</title>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js';

const supabase = createClient(
  'https://zclotvuignhleyrvjekb.supabase.co',
  'sb_publishable_ccgt9ZOZR0kUJhdDwcLOpQ_or0_XjBK'
);

window.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('newsForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    const payload = {
      title: document.getElementById('title').value,
      content: document.getElementById('content').value,
      submitter_name: document.getElementById('name').value,
      submitter_email: document.getElementById('email').value,
      location: document.getElementById('location').value,
      category: document.getElementById('category').value,
      status: 'pending'
    };

    const { error } = await supabase
      .from('news_submissions')
      .insert([payload]);

    if (error) {
      status.innerHTML = '❌ Error: ' + error.message;
      btn.disabled = false;
      btn.textContent = 'Submit News';
      return;
    }

    status.innerHTML = '✅ News submitted successfully and is awaiting admin approval.';
    form.reset();
    btn.disabled = false;
    btn.textContent = 'Submit News';
  });
});
</script>

<style>
body{
margin:0;
background:#0f0f0f;
color:white;
font-family:Arial,sans-serif;
}
.container{
max-width:800px;
margin:40px auto;
padding:20px;
}
.card{
background:#181818;
padding:25px;
border-radius:12px;
border:1px solid #2a2a2a;
}
h1{
margin-top:0;
text-align:center;
}
input,textarea,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
background:#111;
border:1px solid #333;
border-radius:8px;
color:white;
box-sizing:border-box;
}
textarea{
min-height:180px;
resize:vertical;
}
button{
width:100%;
padding:14px;
background:#c0392b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
button:hover{
opacity:.95;
}
.back{
display:inline-block;
margin-bottom:20px;
color:#ff6b57;
text-decoration:none;
}
#status{
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<a href="/news/" class="back">← Back to News</a>

<div class="card">
<h1>📰 Submit News</h1>

<form id="newsForm">

<label>Your Name</label>
<input id="name" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Location</label>
<input id="location" placeholder="Darjeeling, Kalimpong, Siliguri..." required>

<label>Category</label>
<select id="category" required>
<option value="Politics">Politics</option>
<option value="Tourism">Tourism</option>
<option value="Education">Education</option>
<option value="Sports">Sports</option>
<option value="Business">Business</option>
<option value="Tea">Tea Industry</option>
<option value="Weather">Weather</option>
<option value="Community">Community</option>
<option value="Other">Other</option>
</select>

<label>News Title</label>
<input id="title" required>

<label>News Content</label>
<textarea id="content" required></textarea>

<button id="submitBtn" type="submit">Submit News</button>

</form>

<div id="status"></div>

</div>
</div>

</body>
</html>
