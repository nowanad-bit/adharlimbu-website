<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit News | Khabar Darjeeling Ko</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--accent:#c0392b;
--bg:#0e0c0a;
--card:#151515;
--border:#262626;
--text:#ffffff;
--muted:#8d8d8d;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Barlow Condensed',sans-serif;
}

.header{
padding:20px;
text-align:center;
border-bottom:2px solid var(--accent);
background:#0a0a0a;
}

.logo{
font-family:'Playfair Display',serif;
font-size:32px;
font-weight:900;
}

.logo span{
color:var(--accent);
}

.subtitle{
color:var(--muted);
margin-top:8px;
font-size:14px;
letter-spacing:2px;
}

.container{
max-width:800px;
margin:30px auto;
padding:20px;
}

.form-card{
background:var(--card);
border:1px solid var(--border);
border-radius:15px;
padding:25px;
}

.form-title{
font-family:'Playfair Display',serif;
font-size:28px;
margin-bottom:10px;
}

.form-desc{
color:var(--muted);
margin-bottom:25px;
line-height:1.6;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
letter-spacing:1px;
text-transform:uppercase;
}

input,
textarea,
select{
width:100%;
padding:14px;
background:#0f0f0f;
border:1px solid #333;
border-radius:10px;
color:white;
font-size:15px;
margin-bottom:18px;
}

textarea{
min-height:180px;
resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
outline:none;
border-color:var(--accent);
}

.submit-btn{
width:100%;
padding:16px;
background:var(--accent);
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
opacity:.9;
}

.note{
margin-top:15px;
font-size:13px;
color:var(--muted);
text-align:center;
}

#message{
margin-top:20px;
padding:15px;
border-radius:10px;
text-align:center;
display:none;
}

.success{
background:#0f3d1f;
color:#8df5a5;
}

.error{
background:#4d1010;
color:#ffb3b3;
}

.footer{
text-align:center;
padding:25px;
color:#555;
font-size:12px;
}
</style>
</head>

<body>

<header class="header">
<div class="logo">🏔️ Khabar <span>Darjeeling Ko</span></div>
<div class="subtitle">Citizen Journalism Platform</div>
</header>

<div class="container">

<div class="form-card">

<h1 class="form-title">Submit a News Report</h1>

<p class="form-desc">
Witnessed something important in Darjeeling, Kalimpong, Kurseong, Mirik or Siliguri?
Submit your report and our team will review it before publishing.
</p>

<form id="newsForm">

<label>News Title</label>
<input type="text" id="title" required>

<label>Category</label>
<select id="category">
<option>Local News</option>
<option>Politics</option>
<option>Tourism</option>
<option>Tea Industry</option>
<option>Weather</option>
<option>Education</option>
<option>Sports</option>
<option>Business</option>
</select>

<label>Location</label>
<input type="text" id="location" placeholder="Darjeeling, Kalimpong, Siliguri..." required>

<label>News Details</label>
<textarea id="content" required></textarea>

<label>Your Name</label>
